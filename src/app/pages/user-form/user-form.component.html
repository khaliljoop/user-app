<div class="form-container">

  <div class="form-card">
    <h2>➕ Ajouter un utilisateur</h2>

    <form #form="ngForm" (ngSubmit)="submit(form)">

      <!-- Nom -->
      <div class="form-group">
        <label>Nom</label>
        <input
          name="name"
          ngModel
          required
          #name="ngModel"
          placeholder="Entrer le nom" />

        <small *ngIf="name.invalid && name.touched" class="error">
          Nom obligatoire
        </small>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <input
          name="email"
          ngModel
          required
          email
          #email="ngModel"
          placeholder="Entrer l'email" />

        <small *ngIf="email.invalid && email.touched" class="error">
          Email invalide
        </small>
      </div>

      <!-- Bouton -->
      <button [disabled]="form.invalid" class="btn-submit">
        Envoyer
      </button>

    </form>
  </div>

  <hr />

  <!-- Liste -->
  <div class="list-section">
    <h3>📋 Utilisateurs ajoutés</h3>

    <div *ngIf="users.length === 0" class="no-data">
      Aucun utilisateur disponible
    </div>

    <table *ngIf="users.length > 0" class="user-table">
      <thead>
        <tr>
          <th>Nom</th>
          <th>Email</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let user of users">
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
