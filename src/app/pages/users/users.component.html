<h2 class="title"> Utilisateurs</h2>

<div class="search">
  <input [(ngModel)]="search" placeholder="Rechercher un utilisateur..." />

  <!-- <button class="btn-add" [routerLink]="['/formulaire']">
    + Ajouter
  </button> -->
</div>

<table class="user-table">
  <thead>
    <tr>
      <th>Avatar</th>
      <th>Nom</th>
      <th>Email</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let user of filteredUsers">

      <td>
        <img
          [src]="'https://picsum.photos/seed/' + user.id + '/60'"
          class="avatar"
        />
      </td>

      <td>{{ user.name }}</td>
      <td>{{ user.email }}</td>

      <td>
        <button
          class="btn-view"
          (click)="goToDetail(user.id)">
          Voir
        </button>
      </td>

    </tr>

    <tr *ngIf="filteredUsers.length === 0">
      <td colspan="4" class="no-data">
        Aucun utilisateur trouvé
      </td>
    </tr>

  </tbody>
</table>
